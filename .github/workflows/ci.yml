  #     - name: Setup uv venv
  #       run: uv venv .venv --python=3.13

  #     - name: Install
  #       run: uv sync --dev

  #     # TODO, ty cmd over repo
  #     # - name: type check with ty
  #     #   run: ty ./tractor/

  #     # - uses: actions/cache@v3
  #     #     name: Cache uv virtenv as default .venv
  #     #     with:
  #     #       path: ./.venv
  #     #       key: venv-${{ hashFiles('uv.lock') }}

  #     - name: Run MyPy check
